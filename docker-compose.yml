services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: ${XJF_PROFILE:-web}
    image: xjf-pentagi:local
    ports:
      - "${XJF_UI_PORT:-8080}:8080"
    command: ["xjf", "serve", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./config:/workspace/config:ro
      - ./output:/workspace/output
      - ./src:/workspace/src:ro
    working_dir: /workspace
    environment:
      - XJF_CONFIG_DIR=/workspace/config
      - XJF_OUTPUT_DIR=/workspace/output
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-}
      - XJF_LLM_MODEL=${XJF_LLM_MODEL:-gpt-4o-mini}
      - XJF_UI_TOKEN=${XJF_UI_TOKEN:-}
