# Declarative tool registry. Binaries must exist in the container/PATH.
# Add rows as you install more packages in Dockerfile or custom image.

tools:
  nmap:
    binary: nmap
    category: recon
    profiles: [web_recon, internal]
    description: "网络端口扫描与服务指纹识别"

  whois:
    binary: whois
    category: recon
    profiles: [web_recon]
    description: "域名注册与备案等公开元数据（whois）"

  curl:
    binary: curl
    category: recon
    profiles: [web_recon, internal]
    description: "HTTP(S) 客户端，请求与探测 Web"

  dig:
    binary: dig
    category: recon
    profiles: [web_recon, internal]
    description: "DNS 查询（dig）"

  host:
    binary: host
    category: recon
    profiles: [web_recon, internal]
    description: "简单 DNS 正反向解析（host）"

  nc:
    binary: nc
    category: recon
    profiles: [web_recon, internal]
    description: "Netcat 网络调试（仅在授权范围内使用）"

  ldapsearch:
    binary: ldapsearch
    category: internal
    profiles: [internal]
    description: "LDAP 目录查询（需启用 internal profile；仅授权内网/域场景）"

  smbclient:
    binary: smbclient
    category: internal
    profiles: [internal]
    description: "SMB/CIFS 客户端（需启用 internal profile；仅授权内网场景）"
